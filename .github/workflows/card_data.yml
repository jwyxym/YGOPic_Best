name: build ygopic-best

on:
  push:
    tags:
      - '*'
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.95.0

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.18.0'

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Git Config
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "github-actions@github.com"

    - name: Set SSH Key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan git.moenext.com >> ~/.ssh/known_hosts

    - name: Proxy
      run: |
        npm i pm2 -g
        wget https://github.com/shadowsocks/shadowsocks-rust/releases/download/v1.24.0/shadowsocks-v1.24.0.x86_64-unknown-linux-gnu.tar.xz
        mkdir ss
        tar -xJf shadowsocks-v1.24.0.x86_64-unknown-linux-gnu.tar.xz -C ./ss
        cd ss
        chmod 777 *
        printf '%s\n' '${{ secrets.CONFIG_FILE }}' > config.json
        pm2 start ./sslocal --name ss -- -c config.json

    - name: Cache
      uses: actions/cache@v4
      with:
        path: core-wasm/hd-arts
        key: ${{ runner.os }}-cache-hd-arts-${{ hashFiles('core-wasm/hd-arts/**') }}
        restore-keys: |
          ${{ runner.os }}-cache-hd-arts

    - name: clone pics
      env:
        http_proxy: http://127.0.0.1:1081
        https_proxy: http://127.0.0.1:1081
      run: |
        cd core-wasm
        if [ -d "./hd-arts" ]; then
          cd hd-arts
          git pull
          cd ..
        else
          git clone ${{ secrets.PIC_URL }} --depth 1
        fi

    - name: build
      run: |
        cargo run --release -- hd-arts/arts

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: card_data
        retention-days: 1
        path: ./core-wasm/card_data

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build

      - name: Create card_data
        run: |
          cd build
          gh release delete hash-latest --cleanup-tag -y || true
          gh release create hash-latest $(find . -type f) \
            --target "$GITHUB_SHA" \
            --title "card_data" \
            --notes "Latest build for ${{ github.ref_name }}" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
